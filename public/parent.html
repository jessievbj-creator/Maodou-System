<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛豆积分系统 - 妈妈版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      color: #333;
      font-size: 16px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .stat-label {
      color: #999;
      font-size: 14px;
    }

    .today-score {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .today-score .stat-value {
      color: white;
    }

    .today-score .stat-label {
      color: rgba(255, 255, 255, 0.8);
    }

    .progress-section {
      margin-top: 15px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      opacity: 0.8;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .history-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-size: 14px;
      color: #666;
      border-bottom: 1px solid #eee;
    }

    .history-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .history-table tr:hover {
      background: #f8f9fa;
    }

    .score-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 13px;
    }

    .score-badge.perfect {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .score-badge.good {
      background: #e3f2fd;
      color: #1565c0;
    }

    .score-badge.fair {
      background: #fff3e0;
      color: #e65100;
    }

    .score-badge.low {
      background: #ffebee;
      color: #c62828;
    }

    .notification {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .notification.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .notification-text {
      color: #2e7d32;
      font-size: 14px;
    }

    .reward-section {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .reward-section h4 {
      color: #856404;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .reward-section p {
      color: #856404;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stat-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 毛豆积分系统 - 妈妈版</h1>
      <p>实时监控毛豆的学习进度</p>
    </div>

    <div class="notification" id="notification">
      <div class="notification-text" id="notificationText"></div>
    </div>

    <div class="grid">
      <div class="card today-score">
        <h3>📅 今日积分</h3>
        <div class="stat-value" id="todayScore">0</div>
        <div class="stat-label" id="todayMaxScore">满分: 90分</div>
        <div class="progress-section">
          <div class="progress-bar">
            <div class="progress-fill" id="todayProgressFill" style="width: 0%"></div>
          </div>
          <div class="progress-text" id="progressText">0%</div>
        </div>
        <div class="reward-section" id="rewardSection" style="display: none;">
          <h4>🎁 可解锁奖励</h4>
          <p id="rewardText"></p>
        </div>
      </div>

      <div class="card">
        <h3>📈 本周平均</h3>
        <div class="stat-value" id="weekAverage">0</div>
        <div class="stat-label">分</div>
      </div>

      <div class="card">
        <h3>🔥 连续满分</h3>
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">天</div>
      </div>
    </div>

    <div class="card">
      <h3>📋 最近7天记录</h3>
      <table class="history-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>积分</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr>
            <td colspan="3" style="text-align: center; color: #999;">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    let lastScore = 0;

    async function init() {
      await loadTodayScore();
      await loadHistory();
      setInterval(loadTodayScore, 3000); // 每3秒刷新一次
      setInterval(loadHistory, 10000); // 每10秒刷新一次历史
    }

    async function loadTodayScore() {
      try {
        const response = await fetch(`${API_URL}/scores/today`);
        const score = await response.json();
        const dayOfWeek = new Date().getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const maxScore = isWeekend ? 70 : 90;

        const currentScore = score.total_points || 0;

        // 检测积分变化，显示通知
        if (currentScore > lastScore) {
          showNotification(`毛豆完成了任务！积分从 ${lastScore} 增加到 ${currentScore}`);
        }
        lastScore = currentScore;

        document.getElementById('todayScore').textContent = currentScore;
        document.getElementById('todayMaxScore').textContent = `满分: ${maxScore}分`;

        const percentage = Math.min(currentScore / maxScore * 100, 100);
        document.getElementById('todayProgressFill').style.width = percentage + '%';
        document.getElementById('progressText').textContent = Math.round(percentage) + '%';

        // 显示奖励信息
        const rewardSection = document.getElementById('rewardSection');
        const rewardText = document.getElementById('rewardText');

        if (currentScore >= maxScore) {
          rewardSection.style.display = 'block';
          if (isWeekend) {
            rewardText.textContent = '🎉 满分！可以解锁蛋仔派对30分钟 + 零花钱';
          } else {
            rewardText.textContent = '🎉 满分！连续3天满分可以解锁周末额外1小时游戏时间';
          }
        } else if (currentScore >= 80) {
          rewardSection.style.display = 'block';
          rewardText.textContent = '🌟 很棒！可以解锁45分钟游戏时间 + 妈妈夸奖卡';
        } else if (currentScore >= 60) {
          rewardSection.style.display = 'block';
          rewardText.textContent = '👍 不错！可以解锁30分钟游戏时间';
        } else {
          rewardSection.style.display = 'none';
        }
      } catch (error) {
        console.error('加载今日积分失败:', error);
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch(`${API_URL}/history`);
        const history = await response.json();

        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';

        if (history.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">暂无数据</td></tr>';
          return;
        }

        const dayOfWeek = new Date().getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const maxScore = isWeekend ? 70 : 90;

        history.slice(0, 7).forEach((record) => {
          const date = new Date(record.date);
          const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
          const score = record.total_points || 0;

          let badgeClass = 'low';
          if (score >= maxScore) badgeClass = 'perfect';
          else if (score >= 80) badgeClass = 'good';
          else if (score >= 60) badgeClass = 'fair';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${dateStr}</td>
            <td>${score}分</td>
            <td><span class="score-badge ${badgeClass}">${score >= maxScore ? '满分' : score >= 80 ? '很好' : score >= 60 ? '不错' : '需努力'}</span></td>
          `;
          tbody.appendChild(row);
        });

        // 计算本周平均
        const weekScores = history.slice(0, 7).map((r) => r.total_points || 0);
        const average = Math.round(weekScores.reduce((a, b) => a + b, 0) / weekScores.length);
        document.getElementById('weekAverage').textContent = average;

        // 计算连续满分
        let streak = 0;
        for (const record of history) {
          const recordMaxScore = record.is_weekend ? 70 : 90;
          if ((record.total_points || 0) >= recordMaxScore) {
            streak++;
          } else {
            break;
          }
        }
        document.getElementById('streak').textContent = streak;
      } catch (error) {
        console.error('加载历史记录失败:', error);
      }
    }

    function showNotification(message) {
      const notification = document.getElementById('notification');
      const notificationText = document.getElementById('notificationText');
      notificationText.textContent = message;
      notification.classList.add('show');

      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    init();
  </script>
</body>
</html>
