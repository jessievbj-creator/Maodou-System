<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛豆数据面板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .score-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    
    .score-display {
      font-size: 60px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .score-label {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }
    
    .reward-info {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
    }
    
    .reward-info strong {
      color: #667eea;
    }
    
    .trend-section {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .trend-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }
    
    .trend-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 150px;
      gap: 8px;
    }
    
    .trend-bar {
      flex: 1;
      background: #667eea;
      border-radius: 8px 8px 0 0;
      position: relative;
      min-height: 10px;
      transition: all 0.3s;
    }
    
    .trend-bar:hover {
      background: #764ba2;
    }
    
    .trend-label {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #999;
      white-space: nowrap;
    }
    
    .trend-value {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: bold;
      color: #667eea;
    }
    
    .footer {
      text-align: center;
      color: white;
      font-size: 12px;
      margin-top: 30px;
    }
    
    .link {
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }
    
    @media (max-width: 480px) {
      .score-display {
        font-size: 48px;
      }
      
      .trend-section {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 毛豆数据面板</h1>
      <p id="dateDisplay"></p>
    </div>
    
    <div class="score-card">
      <div class="score-display" id="scoreDisplay">0</div>
      <div class="score-label">今日积分</div>
      <div class="reward-info" id="rewardInfo">
        还需要 <strong>60</strong> 分解锁 1 小时游戏时间
      </div>
    </div>
    
    <div class="trend-section">
      <div class="trend-title">📈 7天趋势</div>
      <div class="trend-chart" id="trendChart"></div>
    </div>
    
    <div class="footer">
      <p><span class="link" onclick="window.location.href='/score'">✏️ 返回打分</span></p>
    </div>
  </div>
  
  <script>
    async function loadDashboard() {
      try {
        const res = await fetch('/api/today');
        const todayData = await res.json();
        
        // 更新日期
        const date = new Date(todayData.date);
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        document.getElementById('dateDisplay').textContent = 
          `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${dayNames[date.getDay()]}`;
        
        // 更新积分
        document.getElementById('scoreDisplay').textContent = todayData.totalScore;
        
        // 更新奖励信息
        updateRewardInfo(todayData.totalScore);
        
        // 加载趋势
        loadTrend();
      } catch (err) {
        console.error('加载失败:', err);
      }
    }
    
    function updateRewardInfo(score) {
      let info = '';
      if (score < 60) {
        info = `还需要 <strong>${60 - score}</strong> 分解锁 1 小时游戏时间`;
      } else if (score < 80) {
        info = `还需要 <strong>${80 - score}</strong> 分解锁 1.5 小时游戏时间`;
      } else {
        info = `🎉 已解锁 1.5 小时游戏时间！`;
      }
      document.getElementById('rewardInfo').innerHTML = info;
    }
    
    async function loadTrend() {
      try {
        const res = await fetch('/api/trend');
        const trend = await res.json();
        
        const chart = document.getElementById('trendChart');
        chart.innerHTML = '';
        
        const maxScore = Math.max(...trend.map(t => t.score), 100);
        
        trend.forEach((item, index) => {
          const height = (item.score / maxScore) * 100;
          const bar = document.createElement('div');
          bar.className = 'trend-bar';
          bar.style.height = height + '%';
          
          const date = new Date(item.date);
          const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
          
          bar.innerHTML = `
            <div class="trend-value">${item.score}</div>
            <div class="trend-label">周${dayNames[date.getDay()]}</div>
          `;
          
          chart.appendChild(bar);
        });
      } catch (err) {
        console.error('加载趋势失败:', err);
      }
    }
    
    // 初始加载
    loadDashboard();
    
    // 每30秒刷新一次
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
