<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛豆积分系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .score-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    
    .score-display {
      font-size: 60px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .score-label {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }
    
    .reward-info {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
    }
    
    .reward-info strong {
      color: #667eea;
    }
    
    .tasks-section {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .tasks-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }
    
    .task-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .task-item:last-child {
      border-bottom: none;
    }
    
    .task-item:hover {
      background: #f9f9f9;
    }
    
    .task-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd;
      border-radius: 6px;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-item.completed .task-checkbox {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }
    
    .task-info {
      flex: 1;
    }
    
    .task-name {
      font-size: 14px;
      color: #333;
      margin-bottom: 5px;
    }
    
    .task-score {
      font-size: 12px;
      color: #999;
    }
    
    .task-item.completed .task-name {
      color: #999;
      text-decoration: line-through;
    }
    
    .trend-section {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .trend-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }
    
    .trend-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 150px;
      gap: 8px;
    }
    
    .trend-bar {
      flex: 1;
      background: #667eea;
      border-radius: 8px 8px 0 0;
      position: relative;
      min-height: 10px;
      transition: all 0.3s;
    }
    
    .trend-bar:hover {
      background: #764ba2;
    }
    
    .trend-label {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #999;
      white-space: nowrap;
    }
    
    .trend-value {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: bold;
      color: #667eea;
    }
    
    .footer {
      text-align: center;
      color: white;
      font-size: 12px;
      margin-top: 30px;
    }
    
    @media (max-width: 480px) {
      .score-display {
        font-size: 48px;
      }
      
      .tasks-section {
        padding: 15px;
      }
      
      .task-item {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 毛豆积分系统</h1>
      <p id="dateDisplay"></p>
    </div>
    
    <div class="score-card">
      <div class="score-display" id="scoreDisplay">0</div>
      <div class="score-label">今日积分</div>
      <div class="reward-info" id="rewardInfo">
        还需要 <strong>60</strong> 分解锁 1 小时游戏时间
      </div>
    </div>
    
    <div class="tasks-section">
      <div class="tasks-title">📋 今日任务</div>
      <div id="tasksList"></div>
    </div>
    
    <div class="trend-section">
      <div class="trend-title">📈 7天趋势</div>
      <div class="trend-chart" id="trendChart"></div>
    </div>
    
    <div class="footer">
      <p>加油，毛豆！💪</p>
    </div>
  </div>
  
  <script>
    let todayData = null;
    
    async function loadToday() {
      try {
        const res = await fetch('/api/today');
        todayData = await res.json();
        
        // 更新日期
        const date = new Date(todayData.date);
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        document.getElementById('dateDisplay').textContent = 
          `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${dayNames[date.getDay()]}`;
        
        // 更新积分
        document.getElementById('scoreDisplay').textContent = todayData.totalScore;
        
        // 更新奖励信息
        updateRewardInfo(todayData.totalScore);
        
        // 渲染任务列表
        renderTasks();
        
        // 加载趋势
        loadTrend();
      } catch (err) {
        console.error('加载失败:', err);
      }
    }
    
    function updateRewardInfo(score) {
      let info = '';
      if (score < 60) {
        info = `还需要 <strong>${60 - score}</strong> 分解锁 1 小时游戏时间`;
      } else if (score < 80) {
        info = `还需要 <strong>${80 - score}</strong> 分解锁 1.5 小时游戏时间`;
      } else {
        info = `🎉 已解锁 1.5 小时游戏时间！`;
      }
      document.getElementById('rewardInfo').innerHTML = info;
    }
    
    function renderTasks() {
      const tasksList = document.getElementById('tasksList');
      tasksList.innerHTML = '';
      
      todayData.tasks.forEach(task => {
        const taskEl = document.createElement('div');
        taskEl.className = `task-item ${task.completed ? 'completed' : ''}`;
        taskEl.innerHTML = `
          <div class="task-checkbox">${task.completed ? '✓' : ''}</div>
          <div class="task-info">
            <div class="task-name">${task.name}</div>
            <div class="task-score">+${task.score}分</div>
          </div>
        `;
        
        taskEl.addEventListener('click', () => toggleTask(task.id, !task.completed));
        tasksList.appendChild(taskEl);
      });
    }
    
    async function toggleTask(taskId, completed) {
      try {
        const res = await fetch('/api/task-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ taskId, completed })
        });
        
        const data = await res.json();
        
        // 更新本地数据
        const task = todayData.tasks.find(t => t.id === taskId);
        if (task) task.completed = completed;
        
        // 更新显示
        document.getElementById('scoreDisplay').textContent = data.totalScore;
        updateRewardInfo(data.totalScore);
        renderTasks();
        
        // 发送通知给主人
        notifyParent(data.totalScore);
      } catch (err) {
        console.error('更新失败:', err);
      }
    }
    
    async function loadTrend() {
      try {
        const res = await fetch('/api/trend');
        const trend = await res.json();
        
        const chart = document.getElementById('trendChart');
        chart.innerHTML = '';
        
        const maxScore = Math.max(...trend.map(t => t.score), 100);
        
        trend.forEach((item, index) => {
          const height = (item.score / maxScore) * 100;
          const bar = document.createElement('div');
          bar.className = 'trend-bar';
          bar.style.height = height + '%';
          
          const date = new Date(item.date);
          const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
          
          bar.innerHTML = `
            <div class="trend-value">${item.score}</div>
            <div class="trend-label">周${dayNames[date.getDay()]}</div>
          `;
          
          chart.appendChild(bar);
        });
      } catch (err) {
        console.error('加载趋势失败:', err);
      }
    }
    
    function notifyParent(score) {
      // 这里可以集成推送通知
      console.log('毛豆今日积分:', score);
    }
    
    // 初始加载
    loadToday();
    
    // 每30秒刷新一次
    setInterval(loadToday, 30000);
  </script>
</body>
</html>
