<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛豆今日学习进度</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #333;
    }
    
    .header p {
      font-size: 20px;
      color: #666;
    }
    
    .score-display {
      background: white;
      border-radius: 30px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      border: 3px solid #f0f0f0;
    }
    
    .score-number {
      font-size: 80px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .score-label {
      font-size: 18px;
      color: #999;
    }
    
    .tasks-section {
      background: white;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }
    
    .tasks-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #333;
    }
    
    .task-item {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .task-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .task-name {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }
    
    .task-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .option {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }
    
    .option:hover {
      border-color: #667eea;
      background: #f9f9ff;
      transform: translateX(5px);
    }
    
    .option.selected {
      border-color: #667eea;
      background: #f0f4ff;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }
    
    .option-radio {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd;
      border-radius: 50%;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    
    .option.selected .option-radio {
      border-color: #667eea;
      background: #667eea;
    }
    
    .option.selected .option-radio::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }
    
    .option-label {
      flex: 1;
      font-size: 16px;
      color: #333;
    }
    
    .option-score {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      margin-left: 10px;
    }
    
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 16px;
      color: #666;
    }
    
    .submit-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 40px auto 0;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .submit-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .status-message {
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    
    .status-message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    @media (max-width: 480px) {
      .header h1 {
        font-size: 40px;
      }
      
      .score-number {
        font-size: 64px;
      }
      
      .task-name {
        font-size: 18px;
      }
      
      .option-label {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 毛豆今日学习进度</h1>
      <p id="dateDisplay"></p>
    </div>
    
    <div class="score-display">
      <div class="score-number" id="scoreDisplay">0</div>
      <div class="score-label">今日积分</div>
    </div>
    
    <div class="tasks-section">
      <div class="tasks-title">📋 今日任务</div>
      <div id="tasksList"></div>
      <button class="submit-btn" id="submitBtn" onclick="submitScores()">✅ 提交今日成绩</button>
      <div class="status-message" id="statusMessage"></div>
    </div>
    
    <div class="footer">
      <p>加油，毛豆！💪</p>
    </div>
  </div>
  
  <script>
    let todayData = null;
    let selectedScores = {};
    
    async function loadToday() {
      try {
        const res = await fetch('/api/today');
        todayData = await res.json();
        
        // 更新日期
        const date = new Date(todayData.date);
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        document.getElementById('dateDisplay').textContent = 
          `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${dayNames[date.getDay()]}`;
        
        // 初始化选中的分数
        todayData.tasks.forEach(task => {
          selectedScores[task.id] = task.selectedScore || null;
        });
        
        // 更新积分
        updateScore();
        
        // 渲染任务列表
        renderTasks();
      } catch (err) {
        console.error('加载失败:', err);
      }
    }
    
    function renderTasks() {
      const tasksList = document.getElementById('tasksList');
      tasksList.innerHTML = '';
      
      todayData.tasks.forEach(task => {
        const taskEl = document.createElement('div');
        taskEl.className = 'task-item';
        
        let optionsHTML = '<div class="task-options">';
        task.options.forEach((option, idx) => {
          const isSelected = selectedScores[task.id] === option.score;
          optionsHTML += `
            <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${task.id}, ${option.score})">
              <div class="option-radio"></div>
              <div class="option-label">${option.label}</div>
              <div class="option-score">${option.score}分</div>
            </div>
          `;
        });
        optionsHTML += '</div>';
        
        taskEl.innerHTML = `
          <div class="task-name">${task.name}</div>
          ${optionsHTML}
        `;
        
        tasksList.appendChild(taskEl);
      });
    }
    
    function selectOption(taskId, score) {
      selectedScores[taskId] = score;
      updateScore();
      renderTasks();
      saveScore(taskId, score);
    }
    
    function updateScore() {
      const totalScore = Object.values(selectedScores).reduce((sum, score) => {
        return sum + (score !== null ? score : 0);
      }, 0);
      document.getElementById('scoreDisplay').textContent = totalScore;
      updateSubmitButton();
    }
    
    function updateSubmitButton() {
      const btn = document.getElementById('submitBtn');
      const allScored = todayData.tasks.every(t => selectedScores[t.id] !== null);
      
      if (allScored) {
        btn.classList.remove('disabled');
        btn.textContent = '✅ 提交今日成绩';
      } else {
        btn.classList.add('disabled');
        btn.textContent = `⏳ 还需选择 ${todayData.tasks.filter(t => selectedScores[t.id] === null).length} 个任务`;
      }
    }
    
    async function submitScores() {
      const allScored = todayData.tasks.every(t => selectedScores[t.id] !== null);
      
      if (!allScored) {
        showStatus('请先完成所有任务的打分', 'error');
        return;
      }
      
      try {
        const res = await fetch('/api/submit-scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scores: selectedScores })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showStatus('✅ 成绩已提交！毛豆今日日报已发送到飞书', 'success');
          document.getElementById('submitBtn').disabled = true;
        } else {
          showStatus('❌ 提交失败：' + (data.error || '未知错误'), 'error');
        }
      } catch (err) {
        showStatus('❌ 提交失败：' + err.message, 'error');
      }
    }
    
    function showStatus(message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = 'status-message ' + type;
      
      if (type === 'success') {
        setTimeout(() => {
          statusEl.className = 'status-message';
        }, 5000);
      }
    }
    
    // 初始加载
    loadToday();
    
    // 每30秒刷新一次
    setInterval(loadToday, 30000);
  </script>
</body>
</html>
